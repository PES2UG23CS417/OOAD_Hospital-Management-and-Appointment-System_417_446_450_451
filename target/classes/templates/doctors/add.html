<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Add Doctor – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .navbar{background:#1a5276;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:100}
    .brand{font-size:18px;font-weight:700;color:white;text-decoration:none}.brand span{color:#aed6f1}
    .nav-links a{color:rgba(255,255,255,.82);text-decoration:none;font-size:13px;font-weight:500;padding:7px 13px;border-radius:6px;transition:all .18s;margin-left:2px}
    .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.18);color:white}
    .page{max-width:640px;margin:0 auto;padding:28px 24px}
    .breadcrumb{font-size:12px;color:#718096;margin-bottom:16px}.breadcrumb a{color:#2471a3;text-decoration:none}
    .card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    .card-header{background:#1a5276;color:white;padding:20px 26px}
    .card-header h1{font-size:18px;font-weight:700}.card-header p{font-size:11px;color:#aed6f1;margin-top:3px}
    .card-body{padding:26px}
    .form-group{margin-bottom:14px}
    label{font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px}
    input,select{padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:7px;font-size:13px;width:100%;outline:none;transition:border-color .18s,box-shadow .18s}
    input:focus,select:focus{border-color:#2471a3;box-shadow:0 0 0 3px rgba(36,113,163,.13)}
    .alert-error{background:#fff5f5;border-left:4px solid #fc8181;color:#c53030;padding:11px 14px;border-radius:7px;margin-bottom:16px;font-size:13px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:10px 22px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .18s;white-space:nowrap}
    .btn:hover{opacity:.87}
    .btn-primary{background:#1a5276;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}
    .type-tabs{display:flex;gap:0;border:1.5px solid #cbd5e0;border-radius:8px;overflow:hidden;margin-bottom:18px}
    .type-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#718096;background:white;border:none;transition:all .18s}
    .type-tab.active{background:#1a5276;color:white}
    .specialist-field{display:none}
    .specialist-field.show{display:block}
    .checkbox-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f7fafc;border:1.5px solid #e2e8f0;border-radius:7px}
    .checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:#1a5276}
    .form-actions{display:flex;gap:10px;margin-top:20px}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="breadcrumb"><a href="/">Home</a> / <a href="/doctors">Doctors</a> / Add Doctor</div>
  <div class="card">
    <div class="card-header"><h1>＋ Add New Doctor</h1><p>Factory Pattern: DoctorFactory resolves type defaults</p></div>
    <div class="card-body">
      <div th:if="${error}" class="alert-error" th:text="${error}"></div>
      <form th:action="@{/doctors/add}" th:object="${doctorDTO}" method="post">

        <div class="form-group">
          <label>Doctor Type (Factory Pattern)</label>
          <div class="type-tabs">
            <button type="button" class="type-tab" th:classappend="${selectedType == 'GENERAL'} ? ' active'" id="tab-general" onclick="setType('GENERAL')">🩺 General Doctor</button>
            <button type="button" class="type-tab" th:classappend="${selectedType == 'SPECIALIST'} ? ' active'" id="tab-specialist" onclick="setType('SPECIALIST')">🔬 Specialist</button>
          </div>
          <input type="hidden" name="doctorType" id="doctorTypeInput" th:value="${selectedType}"/>
        </div>

        <div class="form-group"><label>Full Name *</label><input type="text" th:field="*{name}" placeholder="Dr. First Last" required/></div>

        <div class="form-group specialist-field" th:classappend="${selectedType == 'SPECIALIST'} ? ' show'" id="specField">
          <label>Specialization *</label>
          <input type="text" th:field="*{specialization}" placeholder="e.g. Cardiology, Neurology"/>
          <small style="color:#718096;font-size:11px;margin-top:4px;display:block">Required for Specialists. Leave blank for General (defaults to "General Medicine").</small>
        </div>

        <div class="form-group"><label>Email *</label><input type="email" th:field="*{email}" placeholder="doctor@hospital.com" required/></div>
        <div class="form-group"><label>Phone *</label><input type="text" th:field="*{phone}" placeholder="9876543210 (digits only)" required/></div>

        <div class="form-group">
          <label>Availability</label>
          <div class="checkbox-row">
            <input type="checkbox" th:field="*{availabilityStatus}" id="avail"/>
            <label for="avail" style="margin-bottom:0;font-weight:500;cursor:pointer">Currently Available for Appointments</label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Doctor</button>
          <a href="/doctors" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  function setType(t) {
    document.getElementById('doctorTypeInput').value = t;
    document.getElementById('tab-general').className   = 'type-tab' + (t === 'GENERAL'    ? ' active' : '');
    document.getElementById('tab-specialist').className = 'type-tab' + (t === 'SPECIALIST' ? ' active' : '');
    document.getElementById('specField').className = 'form-group specialist-field' + (t === 'SPECIALIST' ? ' show' : '');
  }
</script>
</body>
</html>
