<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>My Appointments – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .page{max-width:1000px;margin:0 auto;padding:28px 24px}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
    .page-header h1{font-size:20px;font-weight:700;color:#1a5276}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .18s;white-space:nowrap}
    .btn:hover{opacity:.87}.btn-primary{background:#1a5276;color:white}.btn-danger{background:#e53e3e;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}.btn-sm{padding:5px 12px;font-size:12px}
    .alert{padding:11px 14px;border-radius:7px;margin-bottom:16px;font-size:13px}
    .alert-success{background:#f0fff4;border-left:4px solid #48bb78;color:#276749}
    .alert-error{background:#fff5f5;border-left:4px solid #fc8181;color:#c53030}
    .table-wrap{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{background:#1a5276;color:white;padding:11px 13px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    tbody tr{border-bottom:1px solid #edf2f7}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:#f7fafc}
    tbody td{padding:10px 13px;font-size:13px;color:#4a5568}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-SCHEDULED{background:#ebf8ff;color:#2b6cb0}.badge-RESCHEDULED{background:#fffaf0;color:#c05621}.badge-CANCELLED{background:#fff5f5;color:#c53030}.badge-COMPLETED{background:#f0fff4;color:#276749}
    .empty{background:white;border-radius:12px;padding:48px;text-align:center;color:#718096;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="page-header">
    <h1>📅 My Appointments — <span th:text="${sessionPatientName}" style="color:#2471a3"></span></h1>
    <a href="/appointments/book" class="btn btn-primary">＋ Book New Appointment</a>
  </div>
  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>
  <div class="table-wrap" th:if="${!appointments.isEmpty()}">
    <table>
      <thead><tr><th>#</th><th>Doctor</th><th>Specialty</th><th>Date &amp; Time</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="a : ${appointments}">
          <td th:text="${a.id}"></td>
          <td><strong th:text="${a.doctorName}"></strong></td>
          <td>—</td>
          <td th:text="${#temporals.format(a.appointmentTime,'dd MMM yyyy, HH:mm')}"></td>
          <td><span class="badge" th:classappend="'badge-' + ${a.status}" th:text="${a.status.displayName}"></span></td>
          <td th:text="${a.notes != null ? a.notes : '—'}"></td>
          <td>
            <a th:if="${a.status.canBeRescheduled()}" th:href="@{/appointments/reschedule/{id}(id=${a.id})}" class="btn btn-ghost btn-sm">📅 Reschedule</a>
            <form th:if="${a.status.canBeCancelled()}" th:action="@{/appointments/cancel/{id}(id=${a.id})}" method="post" style="display:inline">
              <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Cancel?')">✕ Cancel</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="empty" th:if="${appointments.isEmpty()}">
    <div style="font-size:42px;margin-bottom:12px">📅</div>
    <p style="margin-bottom:18px">No appointments yet.</p>
    <a href="/appointments/book" class="btn btn-primary">Book Your First Appointment</a>
  </div>
</div>
</body>
</html>
