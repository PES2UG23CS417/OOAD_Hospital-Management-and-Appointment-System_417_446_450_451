<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Reschedule – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .page{max-width:560px;margin:0 auto;padding:28px 24px}
    .breadcrumb{font-size:12px;color:#718096;margin-bottom:16px}.breadcrumb a{color:#2471a3;text-decoration:none}
    .card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    .card-header{background:#1a5276;color:white;padding:20px 26px}.card-header h1{font-size:18px;font-weight:700}
    .card-body{padding:26px}
    .info-box{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:18px;font-size:13px}
    .info-row{display:flex;justify-content:space-between;padding:3px 0;color:#4a5568}.info-row strong{color:#1a202c}
    label{font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px}
    select{padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:7px;font-size:13px;width:100%;outline:none;background:white;margin-bottom:14px}
    select:focus{border-color:#2471a3;box-shadow:0 0 0 3px rgba(36,113,163,.13)}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:10px 22px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;white-space:nowrap}
    .btn:hover{opacity:.87}.btn-primary{background:#1a5276;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}
    .alert-error{background:#fff5f5;border-left:4px solid #fc8181;color:#c53030;padding:11px 14px;border-radius:7px;margin-bottom:16px;font-size:13px}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="breadcrumb"><a href="/">Home</a> / <a href="/appointments/patient-dashboard">Appointments</a> / Reschedule</div>
  <div class="card">
    <div class="card-header"><h1>📅 Reschedule Appointment</h1></div>
    <div class="card-body">
      <div th:if="${errorMsg}" class="alert-error" th:text="${errorMsg}"></div>
      <div class="info-box">
        <div class="info-row"><span>Appointment #</span><strong th:text="${appointment.id}"></strong></div>
        <div class="info-row"><span>Doctor</span><strong th:text="${appointment.doctorName}"></strong></div>
        <div class="info-row"><span>Current Time</span><strong th:text="${#temporals.format(appointment.appointmentTime,'dd MMM yyyy, HH:mm')}"></strong></div>
        <div class="info-row"><span>Status</span><strong th:text="${appointment.status.displayName}"></strong></div>
      </div>
      <form th:action="@{/appointments/reschedule/{id}(id=${appointment.id})}" method="post">
        <label>Select New Time Slot</label>
        <select name="newTime" required>
          <option value="" disabled selected>— Choose new slot —</option>
          <option th:each="s : ${doctorSlots}" th:value="${s.slotTime}"
                  th:text="${#temporals.format(s.slotTime,'dd MMM yyyy, HH:mm')}"></option>
        </select>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Confirm Reschedule</button>
          <a href="/appointments/patient-dashboard" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
