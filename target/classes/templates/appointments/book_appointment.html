<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Book Appointment – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .page{max-width:620px;margin:0 auto;padding:28px 24px}
    .breadcrumb{font-size:12px;color:#718096;margin-bottom:16px}.breadcrumb a{color:#2471a3;text-decoration:none}
    .card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    .card-header{background:#1a5276;color:white;padding:20px 26px}
    .card-header h1{font-size:18px;font-weight:700}.card-header p{font-size:11px;color:#aed6f1;margin-top:3px}
    .card-body{padding:26px}
    .form-group{margin-bottom:14px}
    label{font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px}
    select,input[type=text]{padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:7px;font-size:13px;width:100%;outline:none;background:white;transition:border-color .18s}
    select:focus,input:focus{border-color:#2471a3;box-shadow:0 0 0 3px rgba(36,113,163,.13)}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:10px 22px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .18s;white-space:nowrap}
    .btn:hover{opacity:.87}.btn-primary{background:#1a5276;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}
    .alert-error{background:#fff5f5;border-left:4px solid #fc8181;color:#c53030;padding:11px 14px;border-radius:7px;margin-bottom:16px;font-size:13px}
    .form-actions{display:flex;gap:10px;margin-top:20px}
    .doc-card{border:1.5px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
    .doc-card:hover,.doc-card.selected{border-color:#2471a3;background:#ebf8ff}
    .doc-name{font-weight:600;font-size:13px}.doc-spec{font-size:11px;color:#718096}
    .avail-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#f0fff4;color:#276749}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="breadcrumb"><a href="/">Home</a> / <a href="/appointments/patient-dashboard">Appointments</a> / Book</div>
  <div class="card">
    <div class="card-header"><h1>📅 Book an Appointment</h1><p>Select a doctor and available time slot</p></div>
    <div class="card-body">
      <div th:if="${errorMsg}" class="alert-error" th:text="${errorMsg}"></div>
      <form th:action="@{/appointments/book}" method="post">
        <div class="form-group">
          <label>Select Doctor</label>
          <select name="doctorId" id="docSelect" onchange="filterSlots()" required>
            <option value="" disabled selected>— Choose a Doctor —</option>
            <option th:each="d : ${doctors}" th:value="${d.doctorId}" th:text="${d.name + ' — ' + d.specialization}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>Available Time Slot</label>
          <select name="appointmentTime" id="slotSelect" required>
            <option value="" disabled selected>— Select Doctor First —</option>
            <option th:each="s : ${allSlots}"
                    th:value="${s.slotTime}"
                    th:text="${s.doctorName + ' — ' + #temporals.format(s.slotTime,'dd MMM yyyy, HH:mm')}"
                    th:data-doctor="${s.doctorId}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <input type="text" name="notes" placeholder="e.g. Regular checkup, follow-up"/>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">✅ Confirm Booking</button>
          <a href="/appointments/patient-dashboard" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
function filterSlots() {
  var did = document.getElementById('docSelect').value;
  var opts = document.getElementById('slotSelect').options;
  for (var i=1; i<opts.length; i++) {
    opts[i].style.display = (!did || opts[i].dataset.doctor === did) ? '' : 'none';
  }
  document.getElementById('slotSelect').selectedIndex = 0;
}
</script>
</body>
</html>
