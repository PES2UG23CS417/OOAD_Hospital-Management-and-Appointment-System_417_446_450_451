<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Invoice History – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .navbar{background:#1a5276;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:100}
    .brand{font-size:18px;font-weight:700;color:white;text-decoration:none}.brand span{color:#aed6f1}
    .nav-links a{color:rgba(255,255,255,.82);text-decoration:none;font-size:13px;font-weight:500;padding:7px 13px;border-radius:6px;transition:all .18s;margin-left:2px}
    .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.18);color:white}
    .page{max-width:1100px;margin:0 auto;padding:28px 24px}
    .breadcrumb{font-size:12px;color:#718096;margin-bottom:16px}.breadcrumb a{color:#2471a3;text-decoration:none}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
    .toolbar h1{font-size:20px;font-weight:700;color:#1a5276}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .18s,transform .12s;white-space:nowrap}
    .btn:hover{opacity:.87;transform:translateY(-1px)}
    .btn-primary{background:#1a5276;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}
    .btn-sm{padding:5px 12px;font-size:12px}
    .search-bar{display:flex;gap:8px;align-items:center}
    .search-bar input{padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:7px;font-size:13px;width:220px;outline:none}
    .search-bar input:focus{border-color:#2471a3;box-shadow:0 0 0 3px rgba(36,113,163,.13)}
    .filter-notice{background:#ebf8ff;border:1px solid #bee3f8;border-radius:7px;padding:9px 14px;font-size:12.5px;color:#2b6cb0;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
    .table-wrap{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{background:#1a5276;color:white;padding:11px 13px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    tbody tr{border-bottom:1px solid #edf2f7;transition:background .12s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f7fafc}
    tbody td{padding:10px 13px;font-size:13px;color:#4a5568}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-DRAFT{background:#ebf8ff;color:#2b6cb0}.badge-PENDING{background:#fffaf0;color:#c05621;border:1px solid #fbd38d}
    .badge-PROCESSING{background:#fefcbf;color:#975a16}.badge-PAID{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
    .badge-CANCELLED{background:#fff5f5;color:#c53030}.badge-REFUNDED{background:#f7fafc;color:#718096}
    .link-action{color:#3182ce;text-decoration:none;font-weight:600;font-size:12px}
    .link-action:hover{text-decoration:underline}
    .empty{background:white;border-radius:12px;padding:48px;text-align:center;color:#718096;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="breadcrumb"><a href="/">Home</a> / <a href="/billing">Billing</a> / Invoice History</div>

  <div class="toolbar">
    <h1>🧾 Invoice History</h1>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <form th:action="@{/billing/history}" method="get" class="search-bar">
        <input type="number" name="patientId" th:value="${patientId}" placeholder="Filter by Patient ID"/>
        <button type="submit" class="btn btn-ghost btn-sm">🔍 Search</button>
        <a href="/billing/history" class="btn btn-ghost btn-sm" th:if="${patientId != null}">✕ Clear</a>
      </form>
      <a href="/billing/generate" class="btn btn-primary">＋ New Bill</a>
    </div>
  </div>

  <div th:if="${patientId != null}" class="filter-notice">
    <span>Showing invoices for Patient ID: <strong th:text="${patientId}"></strong></span>
    <a href="/billing/history" style="color:#2b6cb0;font-weight:600;text-decoration:none">✕ Clear</a>
  </div>

  <div class="table-wrap" th:if="${!invoices.isEmpty()}">
    <table>
      <thead><tr><th>Bill ID</th><th>Patient</th><th>Age</th><th>Gross (₹)</th><th>Discount</th><th>Net (₹)</th><th>Payment</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:each="inv : ${invoices}">
          <td><strong th:text="'#' + ${inv.billId}"></strong></td>
          <td th:text="${inv.patientName}"></td>
          <td th:text="${inv.patientAge}"></td>
          <td th:text="${#numbers.formatDecimal(inv.grossAmount,1,2)}"></td>
          <td>
            <span th:text="${inv.discountType}"></span>
            <small th:if="${inv.discountPercentage > 0}" th:text="'(' + ${inv.discountPercentage} + '%)'"></small>
          </td>
          <td><strong th:text="${#numbers.formatDecimal(inv.netAmount,1,2)}"></strong></td>
          <td th:text="${inv.paymentMethod != null ? inv.paymentMethod : '—'}"></td>
          <td><span class="badge" th:classappend="'badge-' + ${inv.status}" th:text="${inv.status}"></span></td>
          <td th:text="${#temporals.format(inv.createdAt,'dd-MM-yyyy HH:mm')}"></td>
          <td><a th:href="@{/billing/invoice/{id}(id=${inv.billId})}" class="link-action">View →</a></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="empty" th:if="${invoices.isEmpty()}">
    <div style="font-size:42px;margin-bottom:12px">🧾</div>
    <p th:if="${patientId != null}">No invoices found for Patient ID <strong th:text="${patientId}"></strong>.</p>
    <p th:if="${patientId == null}">No invoices yet.</p>
    <a href="/billing/generate" class="btn btn-primary" style="margin-top:14px">＋ Generate First Bill</a>
  </div>
</div>
</body>
</html>
