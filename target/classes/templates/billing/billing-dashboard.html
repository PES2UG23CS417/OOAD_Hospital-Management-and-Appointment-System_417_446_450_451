<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Billing Dashboard – HMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
    .navbar{background:#1a5276;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:100}
    .brand{font-size:18px;font-weight:700;color:white;text-decoration:none}.brand span{color:#aed6f1}
    .nav-links a{color:rgba(255,255,255,.82);text-decoration:none;font-size:13px;font-weight:500;padding:7px 13px;border-radius:6px;transition:all .18s;margin-left:2px}
    .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.18);color:white}
    .page{max-width:1100px;margin:0 auto;padding:28px 24px}
    .breadcrumb{font-size:12px;color:#718096;margin-bottom:16px}.breadcrumb a{color:#2471a3;text-decoration:none}
    .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
    .stat-card{background:white;border-radius:10px;padding:17px 15px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:4px solid #cbd5e0}
    .stat-card.blue{border-top-color:#3182ce}.stat-card.orange{border-top-color:#dd6b20}
    .stat-card.green{border-top-color:#38a169}.stat-card.red{border-top-color:#e53e3e}.stat-card.teal{border-top-color:#2c7a7b}
    .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#718096}
    .stat-value{font-size:26px;font-weight:800;margin-top:6px}
    .stat-card.blue .stat-value{color:#2b6cb0}.stat-card.orange .stat-value{color:#c05621}
    .stat-card.green .stat-value{color:#276749}.stat-card.red .stat-value{color:#c53030}.stat-card.teal .stat-value{color:#285e61}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .18s,transform .12s;white-space:nowrap}
    .btn:hover{opacity:.87;transform:translateY(-1px)}
    .btn-primary{background:#1a5276;color:white}.btn-ghost{background:#edf2f7;color:#4a5568}
    .table-wrap{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    thead th{background:#1a5276;color:white;padding:11px 13px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    tbody tr{border-bottom:1px solid #edf2f7;transition:background .12s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f7fafc}
    tbody td{padding:10px 13px;font-size:13px;color:#4a5568}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-DRAFT{background:#ebf8ff;color:#2b6cb0}.badge-PENDING{background:#fffaf0;color:#c05621;border:1px solid #fbd38d}
    .badge-PROCESSING{background:#fefcbf;color:#975a16}.badge-PAID{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
    .badge-CANCELLED{background:#fff5f5;color:#c53030}.badge-REFUNDED{background:#f7fafc;color:#718096}
    .link-action{color:#3182ce;text-decoration:none;font-weight:600;font-size:12px}
    .link-action:hover{text-decoration:underline}
    .empty{background:white;border-radius:12px;padding:48px;text-align:center;color:#718096;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .command-panel{background:#faf5ff;border-left:4px solid #805ad5;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:20px}
    .command-panel h3{font-size:12px;font-weight:700;color:#6b46c1;margin-bottom:8px}
    .command-panel .history{max-height:120px;overflow-y:auto}
    .command-panel .cmd-item{font-size:11px;color:#553c9a;padding:3px 0;border-bottom:1px solid #e9d8fd;font-family:monospace}
    .command-panel .cmd-item:last-child{border-bottom:none}
  </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="page">
  <div class="breadcrumb"><a href="/">Home</a> / Billing Dashboard</div>

  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-label">Total Invoices</div><div class="stat-value" th:text="${invoices.size()}">0</div></div>
    <div class="stat-card orange"><div class="stat-label">Pending</div><div class="stat-value" th:text="${countPending}">0</div></div>
    <div class="stat-card"><div class="stat-label">Draft</div><div class="stat-value" th:text="${countDraft}">0</div></div>
    <div class="stat-card green"><div class="stat-label">Paid</div><div class="stat-value" th:text="${countPaid}">0</div></div>
    <div class="stat-card teal"><div class="stat-label">Revenue (₹)</div><div class="stat-value" th:text="${#numbers.formatDecimal(totalRevenue,1,2)}">0.00</div></div>
  </div>

  
  </div>

  <div class="toolbar">
    <strong style="font-size:16px;color:#1a5276">Recent Invoices</strong>
    <div style="display:flex;gap:10px">
      <a href="/billing/generate" class="btn btn-primary">＋ Generate New Bill</a>
      <a href="/billing/history"  class="btn btn-ghost">📋 All Invoices</a>
    </div>
  </div>

  <div class="table-wrap" th:if="${!invoices.isEmpty()}">
    <table>
      <thead><tr><th>Bill ID</th><th>Patient</th><th>Gross (₹)</th><th>Discount</th><th>Net (₹)</th><th>Payment</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:each="inv,s : ${invoices}" th:if="${s.index < 10}">
          <td><strong th:text="'#' + ${inv.billId}"></strong></td>
          <td th:text="${inv.patientName}"></td>
          <td th:text="${#numbers.formatDecimal(inv.grossAmount,1,2)}"></td>
          <td><span th:text="${inv.discountType}"></span><small th:if="${inv.discountPercentage > 0}" th:text="'(' + ${inv.discountPercentage} + '%)'"></small></td>
          <td><strong th:text="${#numbers.formatDecimal(inv.netAmount,1,2)}"></strong></td>
          <td th:text="${inv.paymentMethod != null ? inv.paymentMethod : '—'}"></td>
          <td><span class="badge" th:classappend="'badge-' + ${inv.status}" th:text="${inv.status}"></span></td>
          <td th:text="${#temporals.format(inv.createdAt,'dd-MM-yyyy HH:mm')}"></td>
          <td><a th:href="@{/billing/invoice/{id}(id=${inv.billId})}" class="link-action">View →</a></td>
        </tr>
      </tbody>
    </table>
  </div>
  <p th:if="${invoices.size() > 10}" style="font-size:12px;color:#718096;margin-top:8px">
    Showing 10 of <span th:text="${invoices.size()}"></span>. <a href="/billing/history" style="color:#2471a3">View all →</a>
  </p>

  <div class="empty" th:if="${invoices.isEmpty()}">
    <div style="font-size:42px;margin-bottom:12px">🧾</div>
    <p style="margin-bottom:18px">No invoices yet.</p>
    <a href="/billing/generate" class="btn btn-primary">＋ Generate First Bill</a>
  </div>
</div>
</body>
</html>
